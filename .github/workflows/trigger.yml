name: training-journal-trigger

on:
  schedule:
    # 매주 월~금 KST 14:10 실행 (UTC 05:10)
    - cron: '10 5 * * 1-5'
    # 매주 월~금 KST 17:30 실행 (UTC 08:30)
    - cron: '30 8 * * 1-5'
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Trigger main pipeline
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/loopenguin/Training-Log-Hook/actions/workflows/training-journal-automation.yml/dispatches \
            -d '{"ref":"main"}'
